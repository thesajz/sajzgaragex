services:
  - type: web
    name: sajz-video-assembler
    env: python
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg fonts-dejavu-core
      pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: PEXELS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
